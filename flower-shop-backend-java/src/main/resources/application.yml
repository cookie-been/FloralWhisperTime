server:
  port: ${PORT:3001}

spring:
  application:
    name: flower-shop-backend-java
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/floral_whisper_time?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: input

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:Floral@2026}
  jwt:
    secret: ${ADMIN_AUTH_SECRET:floral-whisper-time-java-dev-secret-change-me}
    expires-in-seconds: ${JWT_EXPIRES_IN_SECONDS:86400}
  upload:
    dir: ${UPLOAD_DIR:uploads}
    public-base-url: ${PUBLIC_BASE_URL:http://localhost:${server.port}}

