server:
  port: ${PORT:3001}

spring:
  application:
    name: flower-shop-backend-java
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/floral_whisper_time?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 64MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: input

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:Floral@2026}
  jwt:
    secret: ${ADMIN_AUTH_SECRET:floral-whisper-time-java-dev-secret-change-me}
    expires-in-seconds: ${JWT_EXPIRES_IN_SECONDS:43200}
    issuer: ${JWT_ISSUER:flower-shop-backend-java}
  upload:
    dir: ${UPLOAD_DIR:uploads}
    public-base-url: ${PUBLIC_BASE_URL:http://localhost:${server.port}}
  backup:
    dir: ${BACKUP_DIR:../backups}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:*}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:*}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:false}
    max-age-seconds: ${CORS_MAX_AGE_SECONDS:3600}
  ai-image:
    enabled: ${AI_IMAGE_ENABLED:false}
    provider: ${AI_IMAGE_PROVIDER:volcengine}
    api-key: ${VOLCENGINE_API_KEY:}
    model: ${VOLCENGINE_IMAGE_MODEL:Doubao-Seedream-5.0-lite}
    base-url: ${VOLCENGINE_BASE_URL:https://operator.las.cn-beijing.volces.com/api/v1}
    generate-path: ${VOLCENGINE_IMAGE_GENERATE_PATH:/images/generations}
    max-reference-files: ${AI_IMAGE_MAX_REFERENCE_FILES:3}
    max-reference-file-size-bytes: ${AI_IMAGE_MAX_REFERENCE_FILE_SIZE_BYTES:20971520}
    download-subdir: ${AI_IMAGE_DOWNLOAD_SUBDIR:ai}
    request-timeout-seconds: ${AI_IMAGE_REQUEST_TIMEOUT_SECONDS:120}
    size: ${AI_IMAGE_SIZE:1024x1280}
    response-format: ${AI_IMAGE_RESPONSE_FORMAT:url}
    watermark: ${AI_IMAGE_WATERMARK:false}
  importer:
    enabled: ${JSON_IMPORT_ENABLED:false}
    json-path: ${JSON_IMPORT_PATH:../flower-shop-backend/data/db.json}
    replace-existing: ${JSON_IMPORT_REPLACE_EXISTING:false}
