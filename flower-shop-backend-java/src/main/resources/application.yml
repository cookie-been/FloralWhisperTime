server:
  port: ${PORT:3001}
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:80}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:200}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:1000}
    connection-timeout: ${SERVER_TOMCAT_CONNECTION_TIMEOUT:5s}

spring:
  application:
    name: flower-shop-backend-java
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/floral_whisper_time?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:20}
      minimum-idle: ${DB_MIN_IDLE:5}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:3000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT_MS:1000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 64MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: input

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:Floral@2026}
  jwt:
    secret: ${ADMIN_AUTH_SECRET:floral-whisper-time-java-dev-secret-change-me}
    expires-in-seconds: ${JWT_EXPIRES_IN_SECONDS:43200}
    issuer: ${JWT_ISSUER:flower-shop-backend-java}
  upload:
    dir: ${UPLOAD_DIR:uploads}
    public-base-url: ${PUBLIC_BASE_URL:http://localhost:${server.port}}
  backup:
    dir: ${BACKUP_DIR:../backups}
  operation-log:
    retention-days: ${OPERATION_LOG_RETENTION_DAYS:180}
    archive-dir: ${OPERATION_LOG_ARCHIVE_DIR:operation-logs}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:*}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:*}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:false}
    max-age-seconds: ${CORS_MAX_AGE_SECONDS:3600}
  ai-image:
    enabled: ${AI_IMAGE_ENABLED:false}
    provider: ${AI_IMAGE_PROVIDER:volcengine}
    api-key: ${VOLCENGINE_API_KEY:}
    model: ${VOLCENGINE_IMAGE_MODEL:Doubao-Seedream-5.0-lite}
    base-url: ${VOLCENGINE_BASE_URL:https://operator.las.cn-beijing.volces.com/api/v1}
    generate-path: ${VOLCENGINE_IMAGE_GENERATE_PATH:/images/generations}
    max-reference-files: ${AI_IMAGE_MAX_REFERENCE_FILES:3}
    max-reference-file-size-bytes: ${AI_IMAGE_MAX_REFERENCE_FILE_SIZE_BYTES:20971520}
    download-subdir: ${AI_IMAGE_DOWNLOAD_SUBDIR:ai}
    request-timeout-seconds: ${AI_IMAGE_REQUEST_TIMEOUT_SECONDS:120}
    size: ${AI_IMAGE_SIZE:1024x1280}
    response-format: ${AI_IMAGE_RESPONSE_FORMAT:url}
    watermark: ${AI_IMAGE_WATERMARK:false}
  importer:
    enabled: ${JSON_IMPORT_ENABLED:false}
    json-path: ${JSON_IMPORT_PATH:src/main/resources/seed/legacy-db.json}
    replace-existing: ${JSON_IMPORT_REPLACE_EXISTING:false}
  runtime:
    environment: ${APP_ENVIRONMENT:local}
    git-revision: ${APP_GIT_REVISION:dev}
    deployed-at: ${APP_DEPLOYED_AT:}
  security:
    data-encryption-key: ${APP_DATA_ENCRYPTION_KEY:floral-whisper-time-dev-data-key-2026}
  protection:
    public-read:
      enabled: ${PROTECTION_PUBLIC_READ_ENABLED:true}
      capacity: ${PROTECTION_PUBLIC_READ_CAPACITY:60}
      refill-seconds: ${PROTECTION_PUBLIC_READ_REFILL_SECONDS:10}
    public-write:
      enabled: ${PROTECTION_PUBLIC_WRITE_ENABLED:true}
      capacity: ${PROTECTION_PUBLIC_WRITE_CAPACITY:12}
      refill-seconds: ${PROTECTION_PUBLIC_WRITE_REFILL_SECONDS:60}
    admin:
      enabled: ${PROTECTION_ADMIN_ENABLED:true}
      capacity: ${PROTECTION_ADMIN_CAPACITY:30}
      refill-seconds: ${PROTECTION_ADMIN_REFILL_SECONDS:60}
    heavy:
      enabled: ${PROTECTION_HEAVY_ENABLED:true}
      capacity: ${PROTECTION_HEAVY_CAPACITY:6}
      refill-seconds: ${PROTECTION_HEAVY_REFILL_SECONDS:60}
    concurrency:
      ai:
        enabled: ${PROTECTION_CONCURRENCY_AI_ENABLED:true}
        max-concurrent: ${PROTECTION_CONCURRENCY_AI_MAX_CONCURRENT:2}
      upload:
        enabled: ${PROTECTION_CONCURRENCY_UPLOAD_ENABLED:true}
        max-concurrent: ${PROTECTION_CONCURRENCY_UPLOAD_MAX_CONCURRENT:4}
      config-import:
        enabled: ${PROTECTION_CONCURRENCY_CONFIG_IMPORT_ENABLED:true}
        max-concurrent: ${PROTECTION_CONCURRENCY_CONFIG_IMPORT_MAX_CONCURRENT:1}
