services:
  backend:
    build:
      context: .
      dockerfile: flower-shop-backend/Dockerfile
    environment:
      PORT: 3001
      PUBLIC_BASE_URL: ""
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Floral@2026}
      ADMIN_AUTH_SECRET: ${ADMIN_AUTH_SECRET:-floral-whisper-time-docker-secret}
    volumes:
      - ./flower-shop-backend/data:/app/data
      - ./flower-shop-backend/uploads:/app/uploads
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: flower-shop-web/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"
    restart: unless-stopped

