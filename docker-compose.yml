services:
  mysql:
    image: mysql:8.0
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-floral_whisper_time}
      MYSQL_USER: ${MYSQL_USER:-floral_whisper}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-root-password}
    volumes:
      - floral_whisper_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: flower-shop-backend-java/Dockerfile.runtime
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 3001
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-floral_whisper_time}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: ${MYSQL_USER:-floral_whisper}
      DB_PASSWORD: ${MYSQL_PASSWORD:-change-me}
      PUBLIC_BASE_URL: ""
      UPLOAD_DIR: /app/uploads
      BACKUP_DIR: /app/backups
      SERVER_TOMCAT_THREADS_MAX: ${SERVER_TOMCAT_THREADS_MAX:-80}
      SERVER_TOMCAT_ACCEPT_COUNT: ${SERVER_TOMCAT_ACCEPT_COUNT:-200}
      SERVER_TOMCAT_MAX_CONNECTIONS: ${SERVER_TOMCAT_MAX_CONNECTIONS:-1000}
      SERVER_TOMCAT_CONNECTION_TIMEOUT: ${SERVER_TOMCAT_CONNECTION_TIMEOUT:-5s}
      DB_MAX_POOL_SIZE: ${DB_MAX_POOL_SIZE:-20}
      DB_MIN_IDLE: ${DB_MIN_IDLE:-5}
      DB_CONNECTION_TIMEOUT_MS: ${DB_CONNECTION_TIMEOUT_MS:-3000}
      DB_VALIDATION_TIMEOUT_MS: ${DB_VALIDATION_TIMEOUT_MS:-1000}
      DB_IDLE_TIMEOUT_MS: ${DB_IDLE_TIMEOUT_MS:-600000}
      DB_MAX_LIFETIME_MS: ${DB_MAX_LIFETIME_MS:-1800000}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Floral@2026}
      ADMIN_AUTH_SECRET: ${ADMIN_AUTH_SECRET:-replace-with-a-long-random-secret}
      JWT_ISSUER: ${JWT_ISSUER:-flower-shop-backend-java}
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-production}
      APP_GIT_REVISION: ${APP_GIT_REVISION:-dev}
      APP_DEPLOYED_AT: ${APP_DEPLOYED_AT:-}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-*}
      AI_IMAGE_ENABLED: ${AI_IMAGE_ENABLED:-false}
      AI_IMAGE_PROVIDER: ${AI_IMAGE_PROVIDER:-volcengine}
      VOLCENGINE_API_KEY: ${VOLCENGINE_API_KEY:-}
      VOLCENGINE_IMAGE_MODEL: ${VOLCENGINE_IMAGE_MODEL:-Doubao-Seedream-5.0-lite}
      VOLCENGINE_BASE_URL: ${VOLCENGINE_BASE_URL:-https://operator.las.cn-beijing.volces.com/api/v1}
      VOLCENGINE_IMAGE_GENERATE_PATH: ${VOLCENGINE_IMAGE_GENERATE_PATH:-/images/generations}
      AI_IMAGE_MAX_REFERENCE_FILES: ${AI_IMAGE_MAX_REFERENCE_FILES:-3}
      AI_IMAGE_MAX_REFERENCE_FILE_SIZE_BYTES: ${AI_IMAGE_MAX_REFERENCE_FILE_SIZE_BYTES:-20971520}
      AI_IMAGE_DOWNLOAD_SUBDIR: ${AI_IMAGE_DOWNLOAD_SUBDIR:-ai}
      AI_IMAGE_REQUEST_TIMEOUT_SECONDS: ${AI_IMAGE_REQUEST_TIMEOUT_SECONDS:-120}
      AI_IMAGE_SIZE: ${AI_IMAGE_SIZE:-1024x1280}
      AI_IMAGE_RESPONSE_FORMAT: ${AI_IMAGE_RESPONSE_FORMAT:-url}
      AI_IMAGE_WATERMARK: ${AI_IMAGE_WATERMARK:-false}
      PROTECTION_PUBLIC_READ_ENABLED: ${PROTECTION_PUBLIC_READ_ENABLED:-true}
      PROTECTION_PUBLIC_READ_CAPACITY: ${PROTECTION_PUBLIC_READ_CAPACITY:-60}
      PROTECTION_PUBLIC_READ_REFILL_SECONDS: ${PROTECTION_PUBLIC_READ_REFILL_SECONDS:-10}
      PROTECTION_PUBLIC_WRITE_ENABLED: ${PROTECTION_PUBLIC_WRITE_ENABLED:-true}
      PROTECTION_PUBLIC_WRITE_CAPACITY: ${PROTECTION_PUBLIC_WRITE_CAPACITY:-12}
      PROTECTION_PUBLIC_WRITE_REFILL_SECONDS: ${PROTECTION_PUBLIC_WRITE_REFILL_SECONDS:-60}
      PROTECTION_ADMIN_ENABLED: ${PROTECTION_ADMIN_ENABLED:-true}
      PROTECTION_ADMIN_CAPACITY: ${PROTECTION_ADMIN_CAPACITY:-30}
      PROTECTION_ADMIN_REFILL_SECONDS: ${PROTECTION_ADMIN_REFILL_SECONDS:-60}
      PROTECTION_HEAVY_ENABLED: ${PROTECTION_HEAVY_ENABLED:-true}
      PROTECTION_HEAVY_CAPACITY: ${PROTECTION_HEAVY_CAPACITY:-6}
      PROTECTION_HEAVY_REFILL_SECONDS: ${PROTECTION_HEAVY_REFILL_SECONDS:-60}
      PROTECTION_CONCURRENCY_AI_ENABLED: ${PROTECTION_CONCURRENCY_AI_ENABLED:-true}
      PROTECTION_CONCURRENCY_AI_MAX_CONCURRENT: ${PROTECTION_CONCURRENCY_AI_MAX_CONCURRENT:-2}
      PROTECTION_CONCURRENCY_UPLOAD_ENABLED: ${PROTECTION_CONCURRENCY_UPLOAD_ENABLED:-true}
      PROTECTION_CONCURRENCY_UPLOAD_MAX_CONCURRENT: ${PROTECTION_CONCURRENCY_UPLOAD_MAX_CONCURRENT:-4}
      PROTECTION_CONCURRENCY_CONFIG_IMPORT_ENABLED: ${PROTECTION_CONCURRENCY_CONFIG_IMPORT_ENABLED:-true}
      PROTECTION_CONCURRENCY_CONFIG_IMPORT_MAX_CONCURRENT: ${PROTECTION_CONCURRENCY_CONFIG_IMPORT_MAX_CONCURRENT:-1}
    volumes:
      - ./flower-shop-backend-java/uploads:/app/uploads
      - ./backups:/app/backups
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: flower-shop-web/Dockerfile.runtime
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  floral_whisper_mysql:
